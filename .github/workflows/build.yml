name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: >
          Tag to build and attach installers to (e.g. v1.0.15). Use this when you click
          "Run workflow" on branch main — otherwise the release step is skipped.
          Or select the tag in the "Use workflow from" dropdown instead of main.
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.release_tag }}
  cancel-in-progress: false

jobs:
  # Compute checkout ref and whether to run the release job (needs a version tag).
  resolve:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.ctx.outputs.checkout_ref }}
      release_ok: ${{ steps.ctx.outputs.release_ok }}
      tag_name: ${{ steps.ctx.outputs.tag_name }}
    steps:
      - name: Resolve ref and release gate
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          CHECKOUT_REF="${REF}"
          RELEASE_OK=false
          TAG_NAME=""

          # Push of tag v* → build that tag and release
          if [[ "${REF}" == refs/tags/v* ]]; then
            RELEASE_OK=true
            TAG_NAME="${REF#refs/tags/}"
          fi

          # Manual run: optional release_tag builds refs/tags/vX.Y.Z and enables release
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${INPUT_TAG:-}" ]; then
            T="${INPUT_TAG#refs/tags/}"
            CHECKOUT_REF="refs/tags/${T}"
            RELEASE_OK=true
            TAG_NAME="${T}"
          fi

          echo "checkout_ref=${CHECKOUT_REF}" >> "${GITHUB_OUTPUT}"
          echo "release_ok=${RELEASE_OK}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "Resolved: checkout_ref=${CHECKOUT_REF} release_ok=${RELEASE_OK} tag_name=${TAG_NAME}"

  build:
    needs: resolve
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
            arch: [x64, arm64]
          - os: windows-latest
            platform: win
            arch: [x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Windows (x64)
        if: matrix.os == 'windows-latest'
        run: npm run build && npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Mac (x64 + arm64)
        if: matrix.os == 'macos-latest'
        run: npm run build && npx electron-builder --mac dmg zip --x64 --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Upload Mac artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    if: needs.resolve.outputs.release_ok == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}
          fetch-depth: 1

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./release/windows

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: ./release/mac

      - name: Verify installers before upload
        run: |
          set -euo pipefail
          ls -la ./release/windows ./release/mac
          WIN=$(find ./release/windows -maxdepth 2 -name '*.exe' | wc -l | tr -d ' ')
          DMG=$(find ./release/mac -maxdepth 2 -name '*.dmg' | wc -l | tr -d ' ')
          ZIP=$(find ./release/mac -maxdepth 2 -name '*.zip' | wc -l | tr -d ' ')
          if [ "${WIN}" -lt 1 ]; then
            echo "::error::No Windows .exe found under ./release/windows — build step did not produce installers."
            exit 1
          fi
          if [ "${DMG}" -lt 1 ]; then
            echo "::error::No macOS .dmg found under ./release/mac — build step did not produce installers."
            exit 1
          fi
          if [ "${ZIP}" -lt 1 ]; then
            echo "::error::No macOS .zip found under ./release/mac — zip target did not produce archives."
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag_name }}
          fail_on_unmatched_files: false
          files: |
            ./release/windows/*.exe
            ./release/windows/*.blockmap
            ./release/mac/*.dmg
            ./release/mac/*.zip
            ./release/mac/*.blockmap
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
