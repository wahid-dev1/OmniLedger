name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.1)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
            arch: [x64, arm64]
          - os: windows-latest
            platform: win
            arch: [x64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build Windows (x64)
        if: matrix.os == 'windows-latest'
        run: npm run build && npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Mac (x64 + arm64)
        if: matrix.os == 'macos-latest'
        run: npm run build && npx electron-builder --mac dmg zip --x64 --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      # Note: latest.yml / latest-mac.yml are NOT produced with --publish never (electron-builder).
      # Only upload real installers + blockmaps so globs never match zero files silently.
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Upload Mac artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./release/windows

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: ./release/mac

      - name: Verify installers before upload
        run: |
          set -euo pipefail
          ls -la ./release/windows ./release/mac
          WIN=$(find ./release/windows -maxdepth 2 -name '*.exe' | wc -l | tr -d ' ')
          DMG=$(find ./release/mac -maxdepth 2 -name '*.dmg' | wc -l | tr -d ' ')
          ZIP=$(find ./release/mac -maxdepth 2 -name '*.zip' | wc -l | tr -d ' ')
          if [ "${WIN}" -lt 1 ]; then
            echo "::error::No Windows .exe found under ./release/windows — build step did not produce installers."
            exit 1
          fi
          if [ "${DMG}" -lt 1 ]; then
            echo "::error::No macOS .dmg found under ./release/mac — build step did not produce installers."
            exit 1
          fi
          if [ "${ZIP}" -lt 1 ]; then
            echo "::error::No macOS .zip found under ./release/mac — zip target did not produce archives."
            exit 1
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Blockmaps may be absent in edge cases; installers are enforced above.
          fail_on_unmatched_files: false
          files: |
            ./release/windows/*.exe
            ./release/windows/*.blockmap
            ./release/mac/*.dmg
            ./release/mac/*.zip
            ./release/mac/*.blockmap
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
