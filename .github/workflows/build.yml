# Unified release pipeline:
# - push to main → ensure a unique git tag, build Win+Mac, publish GitHub Release (same run).
# - push tag v* → build + publish (e.g. manual tag).
# - workflow_dispatch → optional release_tag, or run from main / tag only.
#
# Tag creation + installers happen in one workflow so GITHUB_TOKEN can push tags and still run build jobs.
# If package.json version tag already exists on another commit, we auto-suffix a unique tag
# (vX.Y.Z-r<run_number>) so every merged PR to main still gets a release.

name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: >
          Optional. Exact tag to build (e.g. v1.0.16). Use when re-running for an existing tag.
          Leave empty when running from main or from a tag — version comes from package.json / ref.
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.repository }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.plan.outputs.checkout_ref }}
      tag_name: ${{ steps.plan.outputs.tag_name }}
      release_ok: ${{ steps.plan.outputs.release_ok }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Plan tag, ref, and release
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          PKG_TAG="v${VERSION}"

          checkout_ref=""
          tag_name=""
          release_ok=false

          git fetch origin --tags --force

          # Manual runs must target main, a v* tag, or provide release_tag (avoid accidental CI spend).
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            if [[ "${REF}" != refs/heads/main ]] && [[ "${REF}" != refs/tags/v* ]] && [ -z "${INPUT_TAG:-}" ]; then
              echo "::error::Run from branch **main**, a **v*** tag, or set workflow input **release_tag**."
              exit 1
            fi
          fi

          ensure_tag_points_here() {
            local TAG="$1"
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              local ex
              ex=$(git rev-parse "${TAG}^0")
              if [ "$ex" != "$SHA" ]; then
                # Keep release flow automatic for every main merge.
                # When base tag exists on another commit, mint a unique tag for this run.
                TAG="${TAG}-r${GITHUB_RUN_NUMBER}"
                echo "::notice::Base tag exists on another commit. Using unique tag ${TAG}."
                if git rev-parse "$TAG" >/dev/null 2>&1; then
                  local ex2
                  ex2=$(git rev-parse "${TAG}^0")
                  if [ "$ex2" != "$SHA" ]; then
                    echo "::error::Generated tag ${TAG} already points to another commit. Re-run workflow."
                    exit 1
                  fi
                  echo "::notice::Generated tag ${TAG} already at ${SHA}."
                  echo "$TAG"
                  return 0
                fi
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git config user.name "github-actions[bot]"
                git tag -a "$TAG" -m "Release ${TAG}"
                PAT="${RELEASE_PUSH_TOKEN:-${GITHUB_TOKEN}}"
                git remote set-url origin "https://x-access-token:${PAT}@github.com/${GITHUB_REPOSITORY}.git"
                git push origin "refs/tags/${TAG}"
                echo "$TAG"
                return 0
              fi
              echo "::notice::Tag ${TAG} already at ${SHA}."
              echo "$TAG"
            else
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git config user.name "github-actions[bot]"
              git tag -a "$TAG" -m "Release ${TAG}"
              PAT="${RELEASE_PUSH_TOKEN:-${GITHUB_TOKEN}}"
              git remote set-url origin "https://x-access-token:${PAT}@github.com/${GITHUB_REPOSITORY}.git"
              git push origin "refs/tags/${TAG}"
              echo "$TAG"
            fi
          }

          # Manual: explicit tag only
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${INPUT_TAG:-}" ]; then
            T="${INPUT_TAG#refs/tags/}"
            checkout_ref="refs/tags/${T}"
            tag_name="${T}"
            echo "checkout_ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"
            echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
            echo "release_ok=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Push of semver tag → release that revision
          if [[ "${REF}" == refs/tags/v* ]]; then
            checkout_ref="${REF}"
            tag_name="${REF#refs/tags/}"
            echo "checkout_ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"
            echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
            echo "release_ok=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # main: tag package.json version at HEAD (or a unique fallback tag), then build this SHA
          if [[ "${REF}" == refs/heads/main ]]; then
            tag_name="$(ensure_tag_points_here "${PKG_TAG}")"
            checkout_ref="${SHA}"
            echo "checkout_ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"
            echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
            echo "release_ok=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::warning::Skipping release (run from main, a v* tag, or set release_tag)."
          checkout_ref="${SHA}"
          echo "checkout_ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=" >> "${GITHUB_OUTPUT}"
          echo "release_ok=false" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    if: needs.prepare.outputs.release_ok == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application (Vite + electron TS)
        run: npm run build

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac dmg zip --x64 --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.release_ok == 'true'

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./release/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: ./release/mac

      - name: Verify installers
        run: |
          set -euo pipefail
          ls -la ./release/windows ./release/mac
          WIN=$(find ./release/windows -maxdepth 2 -name '*.exe' | wc -l | tr -d ' ')
          DMG=$(find ./release/mac -maxdepth 2 -name '*.dmg' | wc -l | tr -d ' ')
          ZIP=$(find ./release/mac -maxdepth 2 -name '*.zip' | wc -l | tr -d ' ')
          [ "${WIN}" -ge 1 ] || { echo "::error::No Windows .exe"; exit 1; }
          [ "${DMG}" -ge 1 ] || { echo "::error::No macOS .dmg"; exit 1; }
          [ "${ZIP}" -ge 1 ] || { echo "::error::No macOS .zip"; exit 1; }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          fail_on_unmatched_files: false
          files: |
            ./release/windows/*.exe
            ./release/windows/*.blockmap
            ./release/mac/*.dmg
            ./release/mac/*.zip
            ./release/mac/*.blockmap
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
