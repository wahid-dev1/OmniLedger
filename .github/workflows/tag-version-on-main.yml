# After a PR merges to main, create git tag v{package.json version} if it does not exist yet.
#
# GitHub limitation: pushes using the default GITHUB_TOKEN do NOT trigger other workflows, so a tag
# push from Actions will not start "Build and Release" unless we either:
#   (1) Add repo secret RELEASE_PUSH_TOKEN (classic PAT with `repo` scope) — tag push behaves like a user push, OR
#   (2) We fire "Build and Release" via workflow_dispatch API (below) using the same token.

name: Tag version on main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  tag-if-needed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and push tag when missing
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          write_out() {
            {
              echo "pushed=${1}"
              echo "tag_name=${2}"
              echo "use_dispatch=${3}"
            } >> "${GITHUB_OUTPUT}"
          }

          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "Package version: ${VERSION} → tag ${TAG}"

          git fetch origin --tags
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "${TAG}^{}")
            HEAD_SHA=$(git rev-parse HEAD)
            if [ "${TAG_SHA}" = "${HEAD_SHA}" ]; then
              echo "Tag ${TAG} already points at this commit; nothing to do."
              write_out false "" false
              exit 0
            fi
            echo "::error::Tag ${TAG} exists on another commit. Bump version in package.json in your PR."
            exit 1
          fi

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "${TAG}" -m "Release ${TAG}"

          if [ -n "${RELEASE_PUSH_TOKEN:-}" ]; then
            echo "::notice::Pushing tag with RELEASE_PUSH_TOKEN (triggers Build and Release via push)."
            git remote set-url origin "https://x-access-token:${RELEASE_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "refs/tags/${TAG}"
            write_out true "${TAG}" false
          else
            echo "::notice::Pushing tag with GITHUB_TOKEN, then dispatching Build and Release (same-token push cannot chain workflows)."
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "refs/tags/${TAG}"
            write_out true "${TAG}" true
          fi

      - name: Dispatch Build and Release
        if: steps.tag.outputs.pushed == 'true' && steps.tag.outputs.use_dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag_name }}"
          echo "Dispatching workflow for tag ${TAG}"
          gh workflow run build.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${TAG}"
